<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>考研智能辅助系统</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f1;
        color: #1f2824;
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }
      .shell {
        width: min(520px, calc(100vw - 48px));
        border: 1px solid #d7ded5;
        border-radius: 8px;
        background: #fffefa;
        padding: 28px;
        box-shadow: 0 16px 44px rgba(40, 58, 48, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 20px; font-weight: 650; }
      p { margin: 0; color: #65736c; line-height: 1.7; }
      .bar {
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #e8ede6;
        margin-top: 22px;
      }
      .bar::before {
        content: "";
        display: block;
        height: 100%;
        width: 36%;
        border-radius: inherit;
        background: #2f6f62;
        animation: load 1.2s ease-in-out infinite alternate;
      }
      .error .bar::before { animation: none; width: 100%; background: #b94737; }
      .details {
        display: none;
        margin-top: 18px;
        padding: 12px;
        border: 1px solid #ead1ca;
        border-radius: 6px;
        background: #fff7f4;
        color: #7b3027;
        font-size: 13px;
        overflow-wrap: anywhere;
      }
      .actions { display: none; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
      button {
        border: 1px solid #cbd6cc;
        border-radius: 6px;
        background: #ffffff;
        color: #23332d;
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
      }
      button.primary { border-color: #2f6f62; background: #2f6f62; color: #ffffff; }
      @keyframes load {
        from { transform: translateX(0); }
        to { transform: translateX(180%); }
      }
    </style>
  </head>
  <body>
    <main class="shell" id="shell">
      <h1>考研智能辅助系统</h1>
      <p id="status">正在启动本地学习服务...</p>
      <div class="bar"></div>
      <div class="details" id="details"></div>
      <div class="actions" id="actions">
        <button class="primary" id="openWeb">用浏览器打开 Web 端</button>
        <button id="openLog">查看后端日志</button>
      </div>
    </main>
    <script>
      const desktop = window.kaoyanDesktop;
      const shell = document.getElementById('shell');
      const status = document.getElementById('status');
      const details = document.getElementById('details');
      const actions = document.getElementById('actions');

      function showStartupError(payload) {
        const info = typeof payload === 'string' ? { message: payload } : payload || {};
        shell.classList.add('error');
        status.textContent = '本地学习服务启动失败。';
        details.style.display = 'block';
        actions.style.display = 'flex';
        details.textContent = `${info.message || '未知错误'}\n服务地址：${info.backendUrl || 'http://127.0.0.1:8000'}\n日志：${info.logPath || '%APPDATA%\\kaoyan-assistant-desktop\\logs\\backend.log'}`;
      }

      document.getElementById('openWeb').addEventListener('click', () => desktop?.openWebFallback?.());
      document.getElementById('openLog').addEventListener('click', () => desktop?.openBackendLog?.());
      desktop?.onStartupError?.(showStartupError);
      desktop?.getStartupInfo?.().then((info) => {
        if (info?.message) showStartupError(info);
      });
    </script>
  </body>
</html>
